<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出发吧打工人 · 旅行手账地图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="paper-bg"></div>

<header id="topbar">
  <div class="brand">
    <span class="brand-stamp" aria-hidden="true">
      <img src="travel-logo.png" alt="" width="44" height="44">
    </span>
    <h1>出发吧打工人！</h1>
  </div>
  <div id="city-switch" aria-label="出发城市">
    <button id="city-dd-btn" class="city-dd-btn" aria-haspopup="listbox" aria-expanded="false">
      <span class="dd-pin">📍</span>
      <span id="city-dd-label" class="dd-label">出发地</span>
      <span class="dd-caret" aria-hidden="true">▾</span>
    </button>
    <ul id="city-dd-menu" class="city-dd-menu" role="listbox" aria-label="选择出发城市"></ul>
  </div>
  <nav id="mode-switch" aria-label="出行方式">
    <button class="mode-btn active" data-mode="best"><span class="mb-icon">🌈</span>综合最快</button>
    <button class="mode-btn" data-mode="rail"><span class="mb-icon">🚄</span>只坐高铁</button>
    <button class="mode-btn" data-mode="fly"><span class="mb-icon">🛫</span>只坐飞机</button>
    <button class="mode-btn" data-mode="drive"><span class="mb-icon">🚗</span>自己开车</button>
  </nav>
</header>

<main id="stage">
  <div id="map-wrap">
    <svg id="map"></svg>

    <aside id="legend" class="paper-card">
      <div class="washi washi-pink"></div>
      <h3>🕰 门到门要多久？</h3>
      <p class="legend-note">从<span id="legend-home">上海</span>市区出发，含去车站/机场、候车候机的<b>全部</b>时间</p>
      <ul id="legend-bands"></ul>
      <p class="legend-foot">基于 2024–2026 真实时刻表与导航数据研究整理 · 非实时</p>
    </aside>

    <div id="hover-tip" class="hidden"></div>
  </div>

  <aside id="panel" class="hidden">
    <div class="panel-paper">
      <div class="washi washi-yellow panel-washi"></div>
      <button id="panel-close" aria-label="关闭">✕</button>
      <div id="panel-content"><!-- city journal injected here --></div>
    </div>
  </aside>

  <!-- 缩放控件（Phosphor Icons，panel 打开时隐藏） -->
  <div id="zoom-ctrl" role="group" aria-label="地图缩放">
    <button class="zoom-btn" id="zoom-in" title="放大" aria-label="放大">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M152,112a8,8,0,0,1-8,8H120v24a8,8,0,0,1-16,0V120H80a8,8,0,0,1,0-16h24V80a8,8,0,0,1,16,0v24h24A8,8,0,0,1,152,112Zm77.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88.11,88.11,0,1,1,11.31-11.31l50.07,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z"/></svg>
    </button>
    <button class="zoom-btn" id="zoom-out" title="缩小" aria-label="缩小">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M152,112a8,8,0,0,1-8,8H80a8,8,0,0,1,0-16h64A8,8,0,0,1,152,112Zm77.66,117.66a8,8,0,0,1-11.32,0l-50.06-50.07a88.11,88.11,0,1,1,11.31-11.31l50.07,50.06A8,8,0,0,1,229.66,229.66ZM112,184a72,72,0,1,0-72-72A72.08,72.08,0,0,0,112,184Z"/></svg>
    </button>
    <button class="zoom-btn" id="zoom-reset" title="恢复 100%" aria-label="恢复 100%">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M224,128a96,96,0,0,1-94.71,96H128A95.38,95.38,0,0,1,62.1,197.8a8,8,0,0,1,11-11.63A80,80,0,1,0,71.43,71.39a3.07,3.07,0,0,1-.26.25L44.59,96H72a8,8,0,0,1,0,16H24a8,8,0,0,1-8-8V56a8,8,0,0,1,16,0V85.8L60.25,60A96,96,0,0,1,224,128Z"/></svg>
    </button>
  </div>
</main>

<footer id="credit">
  <span>🧳 数据为研究性整理（高铁时刻 / 航班 / 导航驾车），出行前请以 12306、航司与地图 App 实时信息为准</span>
  <span class="credit-thanks">♡ 创意致敬 nazha 的 <a href="https://travel-maps.nazha.co/" target="_blank" rel="noopener">travel-maps.nazha.co</a></span>
</footer>

<script src="vendor/d3.min.js"></script>
<script src="data/cities.js"></script>
<script src="data/cities-shanghai.js"></script>
<script src="js/map.js"></script>
<script src="js/panel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
